services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modul-teknik-sipil
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
    volumes:
      # Persist SQLite database
      - app-data:/app/data
    # VPS 1GB: batasi container ke 512MB, sisanya untuk OS + Nginx
    mem_limit: 512m
    memswap_limit: 1024m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app-data:
    driver: local
